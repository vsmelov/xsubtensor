# Pre-built localnet: one container runs Alice + Bob (scripts/localnet.sh).
# Default tag v3.1.5 (published 2025-06-30) — aligns with merge-base era / bittensor SDK ~9.7; see
# https://github.com/opentensor/subtensor/pkgs/container/subtensor-localnet
# Override: LOCALNET_IMAGE=ghcr.io/opentensor/subtensor-localnet:latest (or own build).
# After changing the image tag, reset chain volumes: docker compose ... down -v
#
# Явное имя проекта: сеть xsubtensor_default совпадает с SUBTENSOR_DOCKER_NETWORK в .env.subnet-math
# и отделено от стека subnet-math (docker-compose.subnet-math.yml с name: subnet-math).
name: xsubtensor

volumes:
  subtensor-localnet-alice:
  subtensor-localnet-bob:
  rpc-smoke-node-modules:

services:
  localnet:
    image: ${LOCALNET_IMAGE:-ghcr.io/opentensor/subtensor-localnet:v3.1.5}
    container_name: subtensor-localnet
    cpu_count: 4
    mem_limit: 40000000000
    memswap_limit: 80000000000
    # Bind to loopback only — on some Windows + Docker Desktop setups this behaves better than 0.0.0.0 for WS.
    ports:
      - "127.0.0.1:9944:9944"
      - "127.0.0.1:9945:9945"
      - "127.0.0.1:30334:30334"
      - "127.0.0.1:30335:30335"
    volumes:
      - subtensor-localnet-alice:/tmp/alice
      - subtensor-localnet-bob:/tmp/bob
    # True = fast blocks (default). Use ["False"] for non-fast-blocks binary.
    command: ["True"]

  # Windows Docker Desktop: raw ws://127.0.0.1:9944 from the host often breaks (1006).
  # This proxy speaks WSS on 3443 on the host; chain traffic is still plain WS inside the network.
  # Start: docker compose -f docker-compose.localnet.yml --profile wss up -d
  rpc-wss-proxy:
    profiles: ["wss"]
    image: caddy:2.8-alpine
    container_name: subtensor-rpc-wss
    depends_on:
      - localnet
    ports:
      - "127.0.0.1:3443:3443"
    volumes:
      - ./support/Caddyfile.subtensor-rpc-wss:/etc/caddy/Caddyfile:ro

  # One-shot RPC check INSIDE the compose network (bypasses broken host→container WebSocket on Windows).
  # Requires: Docker running. From repo root:
  #   docker compose -f docker-compose.localnet.yml --profile tools run --rm rpc-smoke-check
  rpc-smoke-check:
    profiles: ["tools"]
    image: node:22-bookworm-slim
    working_dir: /app
    depends_on:
      - localnet
    environment:
      WS_URL: ws://localnet:9944
      TIMEOUT_MS: "20000"
    volumes:
      - ./scripts/rpc-smoke:/app
      - rpc-smoke-node-modules:/app/node_modules
    command: ["sh", "-c", "npm install --silent && node check.mjs"]

  # Dev-only HTTP faucet (signs with //Alice). Host: http://127.0.0.1:8090
  # Start: docker compose -f docker-compose.localnet.yml --profile faucet up -d
  faucet:
    profiles: ["faucet"]
    build:
      context: ./services/faucet
      dockerfile: Dockerfile
    container_name: subtensor-faucet
    depends_on:
      - localnet
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      # Dev: правки server.mjs с хоста без rebuild образа (после сохранения — restart контейнера).
      - ./services/faucet/server.mjs:/app/server.mjs
    environment:
      PORT: "8090"
      WS_URL: ws://localnet:9944
      FAUCET_SEED: //Alice
      FAUCET_MAX_TAO_PER_TRANSFER: "1000000"
      # Прокси POST /v1/subnet-math-probe → контейнер subnet-math (тот же Docker-сеть xsubtensor_default).
      # Пустая строка — отключить маршрут. См. REQUEST_TO_SUBNET.md
      SUBNET_MATH_PROBE_URL: ${SUBNET_MATH_PROBE_URL:-http://subtensor-math-probe:8091}

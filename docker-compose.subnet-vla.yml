# Проектное имя отличается от xsubtensor / subnet-math.
name: subnet-vla

# Localnet + кошельки: см. SUBNET_MATH_LOCALNET.md (аналогично, vla-miner / subnet-vla), REQUEST_TO_SUBNET.md (VLA)
#   docker compose -f docker-compose.subnet-vla.yml --env-file .env.subnet-vla up -d --build
#
# С хоста probe: http://127.0.0.1:8094 (внутри сети контейнер :8091).
# Порт на хосте: по умолчанию все интерфейсы 8094 (на Windows надёжнее, чем только 127.0.0.1).
# AI video analyzer (OpenAI vision): http://127.0.0.1:8095  (тело probe: using_ai_verification + OPENAI_API_KEY)
# Локальные MP4 через тот же probe: http://127.0.0.1:8094/videos/... -> subnet-vla/vla-video-static/
# Kitchen runtime shim: http://127.0.0.1:${KITCHEN_RUNTIME_HOST_PORT:-8097}/healthz

networks:
  chain:
    name: ${SUBTENSOR_DOCKER_NETWORK:-xsubtensor_default}
    external: true

services:
  vla-kitchen-runtime:
    image: python:3.11-slim
    container_name: subtensor-vla-kitchen-runtime
    restart: unless-stopped
    networks: [chain]
    ports:
      - "127.0.0.1:${KITCHEN_RUNTIME_HOST_PORT:-8097}:8080"
    volumes:
      - ../kitchen-roboarm:/workspace:ro
    environment:
      TASK_API_RESULTS_DIR: /tmp/task-api/results
      TASK_API_JOB_STORE: /tmp/task-api/jobs.json
      TASK_API_CORS_ORIGINS: http://127.0.0.1:8094,http://127.0.0.1:${KITCHEN_RUNTIME_HOST_PORT:-8097}
      RUN_EVAL: "0"
      USE_COSMOS_WARM: "0"
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        pip install --no-cache-dir -r /workspace/services/task-api/requirements.txt
        cd /workspace/services/task-api
        exec uvicorn app:app --host 0.0.0.0 --port 8080

  # If probe returns 503 for this miner but TCP to the container:8921 works, the chain may still list an old axon IP — restart vla-miner to re-serve.
  vla-miner:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-miner
    restart: unless-stopped
    networks: [chain]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/neurons:/app/neurons
      - ./subnet-vla/scripts:/app/scripts
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${MINER_WALLET:-vla-miner}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      KONNEX_VLA_RUNTIME_BASE_URL: ${KONNEX_VLA_RUNTIME_BASE_URL:-http://vla-kitchen-runtime:8080}
      KONNEX_VLA_RUNTIME_TIMEOUT: ${KONNEX_VLA_RUNTIME_TIMEOUT:-15}
      KONNEX_CONTROL_PLANE_URL: ${KONNEX_CONTROL_PLANE_URL:-}
      KONNEX_INTERNAL_API_TOKEN: ${KONNEX_INTERNAL_API_TOKEN:-}
      KONNEX_CONTROL_PLANE_SUBNET: robokitchen-vla
    command:
      - sh
      - -c
      - |
        IP=$$(hostname -i | awk '{print $$1}')
        exec python neurons/miner.py \
          --netuid $${NETUID} \
          --subtensor.chain_endpoint $${SUBTENSOR_CHAIN_ENDPOINT} \
          --wallet.path /root/.bittensor \
          --wallet.name $${WALLET_NAME} \
          --wallet.hotkey default \
          --axon.port 8921 \
          --axon.external_ip "$$IP" \
          --neuron.name vla-miner \
          --logging.info

  vla-validator:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-validator
    restart: unless-stopped
    networks: [chain]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/neurons:/app/neurons
      - ./subnet-vla/scripts:/app/scripts
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${VALIDATOR_WALLET:-vla-val}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      KONNEX_VLA_RUNTIME_BASE_URL: ${KONNEX_VLA_RUNTIME_BASE_URL:-http://vla-kitchen-runtime:8080}
      KONNEX_VLA_RUNTIME_TIMEOUT: ${KONNEX_VLA_RUNTIME_TIMEOUT:-15}
    command:
      - sh
      - -c
      - |
        IP=$$(hostname -i | awk '{print $$1}')
        exec python neurons/validator.py \
          --netuid $${NETUID} \
          --subtensor.chain_endpoint $${SUBTENSOR_CHAIN_ENDPOINT} \
          --wallet.path /root/.bittensor \
          --wallet.name $${WALLET_NAME} \
          --wallet.hotkey default \
          --axon.port 9121 \
          --axon.external_ip "$$IP" \
          --neuron.name vla-validator \
          --neuron.sample_size 4 \
          --logging.info

  vla-probe:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-probe
    restart: unless-stopped
    networks: [chain]
    ports:
      - "127.0.0.1:8094:8091"
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/scripts:/app/scripts
      - ./subnet-vla/vla-video-static:/app/vla-video-static:ro
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${VALIDATOR_WALLET:-vla-val}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      HOTKEY: default
      PROBE_PORT: "8091"
      SUBTENSOR_CHAIN: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      # skip_dendrite: AI по умолчанию без URL в JSON клиента
      VLA_PROBE_USING_AI: ${VLA_PROBE_USING_AI:-true}
      VLA_VIDEO_ANALYZER_URL: ${VLA_VIDEO_ANALYZER_URL:-http://vla-video-analyzer:8000}
      VLA_VIDEO_STATIC_ROOT: /app/vla-video-static
      # Браузер на хосте; из другого контейнера: http://subtensor-vla-probe:8091
      VLA_PROBE_PUBLIC_BASE: ${VLA_PROBE_PUBLIC_BASE:-http://127.0.0.1:8094}
      # URL анализатора и майнеров для скачивания /videos/... (порт 8091 внутри сети chain)
      VLA_PROBE_INTERNAL_BASE: ${VLA_PROBE_INTERNAL_BASE:-http://subtensor-vla-probe:8091}
    command: ["python", "scripts/vla_probe_http.py"]

  vla-video-analyzer:
    build:
      context: .
      dockerfile: services/vla-video-analyzer/Dockerfile
    container_name: subtensor-vla-video-analyzer
    restart: unless-stopped
    networks: [chain]
    ports:
      - "127.0.0.1:8095:8000"
    # Код с хоста: без пересборки образа при правках Python (--reload перезапускает процесс).
    # Зависимости по-прежнему из образа: при изменении requirements.txt — docker compose build vla-video-analyzer
    volumes:
      - ./subnet-vla/video-robot-eval:/app/video-robot-eval
      - ./services/vla-video-analyzer/main_api.py:/app/main_api.py
    command:
      - uvicorn
      - main_api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app
    env_file:
      - path: .env.subnet-vla
        required: false
      - path: subnet-vla/video-robot-eval/.env
        required: false
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Скачивание MP4 с vla-probe (длинные ролики / медленный диск)
      VIDEO_DOWNLOAD_TIMEOUT_S: ${VIDEO_DOWNLOAD_TIMEOUT_S:-600}

  vla-miner-b:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-miner-b
    restart: unless-stopped
    networks: [chain]
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/neurons:/app/neurons
      - ./subnet-vla/scripts:/app/scripts
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${MINER_WALLET_B:-vla-miner-b}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      KONNEX_VLA_RUNTIME_BASE_URL: ${KONNEX_VLA_RUNTIME_BASE_URL:-http://vla-kitchen-runtime:8080}
      KONNEX_VLA_RUNTIME_TIMEOUT: ${KONNEX_VLA_RUNTIME_TIMEOUT:-15}
    command:
      - sh
      - -c
      - |
        IP=$$(hostname -i | awk '{print $$1}')
        exec python neurons/miner.py \
          --netuid $${NETUID} \
          --subtensor.chain_endpoint $${SUBTENSOR_CHAIN_ENDPOINT} \
          --wallet.path /root/.bittensor \
          --wallet.name $${WALLET_NAME} \
          --wallet.hotkey default \
          --axon.port 8922 \
          --axon.external_ip "$$IP" \
          --neuron.name vla-miner-b \
          --logging.info

  # Third miner (separate coldkey); axon 8923 — see MINER_WALLET_C in .env.subnet-vla
  vla-miner-c:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-miner-c
    restart: unless-stopped
    networks: [chain]
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/neurons:/app/neurons
      - ./subnet-vla/scripts:/app/scripts
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${MINER_WALLET_C:-vla-miner-c}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      KONNEX_VLA_RUNTIME_BASE_URL: ${KONNEX_VLA_RUNTIME_BASE_URL:-http://vla-kitchen-runtime:8080}
      KONNEX_VLA_RUNTIME_TIMEOUT: ${KONNEX_VLA_RUNTIME_TIMEOUT:-15}
    command:
      - sh
      - -c
      - |
        IP=$$(hostname -i | awk '{print $$1}')
        exec python neurons/miner.py \
          --netuid $${NETUID} \
          --subtensor.chain_endpoint $${SUBTENSOR_CHAIN_ENDPOINT} \
          --wallet.path /root/.bittensor \
          --wallet.name $${WALLET_NAME} \
          --wallet.hotkey default \
          --axon.port 8923 \
          --axon.external_ip "$$IP" \
          --neuron.name vla-miner-c \
          --logging.info

  vla-validator-b:
    build:
      context: ./subnet-vla
      dockerfile: Dockerfile
    container_name: subtensor-vla-validator-b
    restart: unless-stopped
    networks: [chain]
    volumes:
      - ${WALLET_PATH:-${USERPROFILE}/.bittensor}:/root/.bittensor
      - ./subnet-vla/template:/app/template
      - ./subnet-vla/neurons:/app/neurons
      - ./subnet-vla/scripts:/app/scripts
    environment:
      NETUID: ${NETUID:-1}
      WALLET_NAME: ${VALIDATOR_WALLET_B:-vla-val-b}
      SUBTENSOR_CHAIN_ENDPOINT: ${SUBTENSOR_CHAIN_ENDPOINT:-ws://subtensor-localnet:9944}
      KONNEX_VLA_RUNTIME_BASE_URL: ${KONNEX_VLA_RUNTIME_BASE_URL:-http://vla-kitchen-runtime:8080}
      KONNEX_VLA_RUNTIME_TIMEOUT: ${KONNEX_VLA_RUNTIME_TIMEOUT:-15}
    command:
      - sh
      - -c
      - |
        IP=$$(hostname -i | awk '{print $$1}')
        exec python neurons/validator.py \
          --netuid $${NETUID} \
          --subtensor.chain_endpoint $${SUBTENSOR_CHAIN_ENDPOINT} \
          --wallet.path /root/.bittensor \
          --wallet.name $${WALLET_NAME} \
          --wallet.hotkey default \
          --axon.port 9122 \
          --axon.external_ip "$$IP" \
          --neuron.name vla-validator-b \
          --neuron.sample_size 4 \
          --logging.info
